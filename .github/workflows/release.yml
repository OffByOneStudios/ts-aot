name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  VCPKG_DEFAULT_TRIPLET: x64-windows-static-md
  VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # vcpkg binary caching via GitHub Actions cache
      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '67af93d0445955cbd003d0708ce6dec02733a2a1'

      # Cache vcpkg installed packages
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: vcpkg_installed/
          key: vcpkg-win-${{ hashFiles('vcpkg.json') }}-${{ env.VCPKG_DEFAULT_TRIPLET }}
          restore-keys: |
            vcpkg-win-${{ hashFiles('vcpkg.json') }}-
            vcpkg-win-

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_DEFAULT_TRIPLET }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test (Golden IR)
        run: python tests/golden_ir/runner.py tests/golden_ir

      - name: Test (Node.js APIs)
        run: python tests/node/run_tests.py

      - name: Package
        shell: pwsh
        run: |
          .\scripts\package.ps1 -NoPdb
          $tag = "${{ github.ref_name }}"
          Rename-Item dist/ts-aot-win-x64.zip "ts-aot-$tag-win-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ts-aot-win-x64
          path: dist/ts-aot-*.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.zip
